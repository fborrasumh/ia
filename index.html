<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicaciones IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .hero-bg {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="hero-bg text-white">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <div class="flex flex-col items-center text-center">
                <div class="flex items-center gap-3 mb-6">
                    <i class="fa-solid fa-brain text-5xl"></i>
                    <h1 class="text-5xl font-bold">Aplicaciones IA</h1>
                </div>
                <p class="text-xl max-w-2xl text-indigo-100">
                    Herramientas inteligentes impulsadas por IA para educación, investigación y creación de contenido académico
                </p>
                <div class="mt-8 flex gap-4">
                    <a href="#apps" 
                       class="px-8 py-4 bg-white text-indigo-700 font-semibold rounded-2xl hover:bg-gray-100 transition flex items-center gap-2">
                        <i class="fa-solid fa-rocket"></i>
                        Explorar herramientas
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Sección de Apps -->
        <section id="apps">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="apps-grid">
                <!-- Las tarjetas se generan con JS -->
            </div>
        </section>
    </main>

    <footer class="bg-white border-t mt-20">
        <div class="max-w-7xl mx-auto px-6 py-12 text-center text-gray-500">
            <p>Desarrollado por <a href="https://github.com/fborrasumh" target="_blank" class="hover:text-indigo-600">@fborrasumh</a></p>
            <p class="text-sm mt-2">Todas las aplicaciones funcionan 100% en tu navegador • Tu API Key de OpenAI nunca se comparte</p>
        </div>
    </footer>

    <script>
        const apps = [
            {
                title: "Genia",
                subtitle: "Programaciones Didácticas",
                url: "https://fborrasumh.github.io/genia/",
                icon: "fa-chalkboard-teacher",
                color: "bg-blue-500",
                description: "Generador completo de programaciones didácticas para ESO y Bachillerato según LOMLOE y normativa de la Comunidad Valenciana."
            },
            {
                title: "Pericia",
                subtitle: "Generador de Cursos",
                url: "https://fborrasumh.github.io/pericia/",
                icon: "fa-graduation-cap",
                color: "bg-purple-500",
                description: "Crea cursos completos con IA: índice, contenido, evaluaciones y proyectos listos para usar."
            },
            {
                title: "Generator",
                subtitle: "Generador de Asignaturas",
                url: "https://fborrasumh.github.io/generator/",
                icon: "fa-book",
                color: "bg-emerald-500",
                description: "Sube tus materiales y genera asignaturas completas con teoría, tests, mapas conceptuales y bibliografía."
            },
            {
                title: "Doctoralia",
                subtitle: "Revisiones Científicas",
                url: "https://fborrasumh.github.io/doctoralia/",
                icon: "fa-microscope",
                color: "bg-red-500",
                description: "Genera artículos de revisión (State-of-the-Art) en ciencias de la salud y STEM con fuentes académicas."
            },
            {
                title: "Humanitas",
                subtitle: "Revisiones Humanidades",
                url: "https://fborrasumh.github.io/humanitas/",
                icon: "fa-landmark",
                color: "bg-amber-500",
                description: "Revisiones académicas en Ciencias Sociales, Humanidades y Derecho con fuentes especializadas."
            },
            {
                title: "Manuscriptor",
                subtitle: "Generador de Artículos",
                url: "https://fborrasumh.github.io/manuscriptor/",
                icon: "fa-pen-nib",
                color: "bg-rose-500",
                description: "Convierte tus datos y manuscritos en artículos científicos completos con citas reales."
            },
            {
                title: "Autoresearch",
                subtitle: "Mejorador iterativo de documentos",
                url: "https://fborrasumh.github.io/autoresearch/",
                icon: "fa-pen-nib",
                color: "bg-red-500",
                description: "Mejora tus documentos científicos con rúbrica e iterativamente."
            },
            {
                title: "TFG_evaluator",
                subtitle: "Evaludor de TFGs mediante rúbricas",
                url: "https://fborrasumh.github.io/TFG_evaluator/",
                icon: "fa-pen-nib",
                color: "bg-red-500",
                description: "Evaluador de TFG con rúbricas."
            }
        ];

        function renderApps() {
            const container = document.getElementById('apps-grid');
            container.innerHTML = '';

            apps.forEach(app => {
                const cardHTML = `
                    <div class="card bg-white rounded-3xl overflow-hidden border border-gray-100 h-full flex flex-col">
                        <div class="${app.color} h-2"></div>
                        <div class="p-8 flex flex-col flex-1">
                            <div class="flex items-center gap-4 mb-6">
                                <div class="w-14 h-14 ${app.color} text-white rounded-2xl flex items-center justify-center text-3xl shadow-inner">
                                    <i class="fa-solid ${app.icon}"></i>
                                </div>
                                <div>
                                    <h3 class="text-2xl font-semibold text-gray-900">${app.title}</h3>
                                    <p class="text-gray-500">${app.subtitle}</p>
                                </div>
                            </div>
                            
                            <p class="text-gray-600 mb-8 flex-1">${app.description}</p>
                            
                            <a href="${app.url}" 
                               target="_blank"
                               class="mt-auto inline-flex items-center justify-center gap-2 bg-gray-900 hover:bg-black text-white font-medium py-4 px-8 rounded-2xl transition">
                                <span>Abrir aplicación</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Inicializar
        window.onload = renderApps;
    </script>
</body>
</html>
